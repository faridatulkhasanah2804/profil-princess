<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Princess</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #FFE4EC, #FFD1E0);
    transition: 0.4s;
}


.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: #FFC1D6;
    padding: 15px 30px;
    display: flex;
    gap: 30px;
    z-index: 999;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.navbar a {
    text-decoration: none;
    color: #5A3E4D;
    font-weight: 600;
}
.navbar button {
    margin-left: 5px;
    background: linear-gradient(135deg, #FF8FB1, #F8AFC4);
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}


.navbar button:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #ff6f9f, #f78fb3);
}


.container {
    display: flex;
    min-height: 100vh;
}


.kiri {
    width: 60%;
    position: relative;
    overflow: hidden;
}


.slider {
    width: 100%;
    height: 100%;
}

.slide-track {
    display: flex;
    width: 600%;
    height: 100%;
    animation: scroll 15s linear infinite;
}

.slide {
    width: calc(100% / 6);
    height: 100%;
    background-size: cover;
    background-position: center;
}

.text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
}

.text h1 {
    font-size: 60px;
    margin: 0;
    font-family: 'Playfair Display', serif;
}


.kanan {
    width: 40%;
    background: linear-gradient(to bottom, #FFCAD4, #FFD1E0);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.kanan img {
    width: 250px;
    height: 280px;
    border-radius: 50%;
    border: 6px solid white;
    object-fit: cover;
}


.about {
    text-align: center;
    padding: 0 20px;
}

.about h2 {
    color: #5A3E4D;
    font-size: 50px;
}

.about p {
    color: #5A3E4D;
}

.hobi {
    padding: 50px;
    background: #FFE4EC;
    text-align: center;
}

.hobi h2 {
    font-size: 32px;
    margin-bottom: 30px;
    color: #5A3E4D;
}


.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.kartu {
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.kartu:hover {
    transform: translateY(-5px);
}

.kartu img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.kartu h3 {
    text-align: center;
}


.sosmed {
    padding: 50px;
    text-align: center;
    background: #FFE4EC;
}

.sosmed h2 {
    color: #5A3E4D;
}

.sosmed-list {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.sosmed-list a {
    background: #F8AFC4;
    padding: 10px 20px;
    border-radius: 25px;
    text-decoration: none;
    color: #5A3E4D;
    transition: 0.3s;
}

.sosmed-list a:hover {
    background: #FF8FB1;
}

.kontak {
    padding: 50px;
    text-align: center;
    background: #FFE4EC;
}

.kontak form {
    max-width: 400px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.kontak input,
.kontak textarea {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.kontak button {
    background: #F8AFC4;
    border: none;
    padding: 10px;
    border-radius: 20px;
    transition: 0.3s;
}

.kontak button:hover {
    background: #FF8FB1;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

@media (max-width: 900px) {
    .container { flex-direction: column; }
    .kiri, .kanan { width: 100%; height: 600px; }
    .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
}


.dark-mode {
    background: linear-gradient(to bottom, #2B1E24, #3A2A30);
    color: #F8DDE6;
}

.dark-mode .navbar {
    background: #3A2A30;
}

.dark-mode .navbar a {
    color: #FFD1E0;
}
.dark-mode .navbar button {
    background: linear-gradient(135deg, #4A2F38, #3A2A30);
    color: #FFD1E0;
}

.dark-mode .navbar button:hover {
    background: linear-gradient(135deg, #5c3a45, #4a2f38);
}

.dark-mode .kanan {
    background: linear-gradient(to bottom, #4A2F38, #2B1E24);
}

.dark-mode .hobi,
.dark-mode .sosmed,
.dark-mode .kontak {
    background: #2B1E24;
}

.dark-mode .about h2,
.dark-mode .about p,
.dark-mode .hobi h2,
.dark-mode .sosmed h2 {
    color: #FFD1E0;
}

.dark-mode .kartu {
    background: #3A2A30;
}

.dark-mode .kartu h3 {
    color: #FFD1E0;
}

.dark-mode .sosmed-list a,
.dark-mode .kontak button {
    background: #4A2F38;
    color: #FFD1E0;
}

.dark-mode .kontak input,
.dark-mode .kontak textarea {
    background: #3A2A30;
    color: #FFD1E0;
    border: none;
}
.fotoKlik {
    cursor: pointer;
    transition: 0.3s;
}

.fotoKlik:hover {
    transform: scale(1.05);
}


#popup {
    display: none;
    position: fixed;
    z-index: 9999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    text-align: center;
}

#popupImg {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}

#close {
    position: absolute;
    top: 20px;
    right: 40px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}
html {
    scroll-behavior: smooth;
}
@media (max-width: 600px) {
    .navbar {
        align-items: center;
        gap: 10px;
        padding-left: 3px;
        padding-right: 5px;
    }

    .navbar a {
        display: block;
    }
}
</style>

<div id="popup">
    <span id="close">&times;</span>
    <img id="popupImg">
</div>
<body id="body">

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#Hobi">Hobbies</a>
    <a href="#kontak">Contact</a>
    <button id="toggleMode">Dark mode</button>
</div>


<div class="container" id="home">


    <div class="kiri">
        <div class="slider">
            <div class="slide-track">
                <div class="slide" style="background-image: url('foto4.jpeg')"></div>
                <div class="slide" style="background-image: url('foto2.JPG')"></div>
                <div class="slide" style="background-image: url('foto5.jpeg')"></div>

                <div class="slide" style="background-image: url('foto4.jpeg')"></div>
                <div class="slide" style="background-image: url('foto2.JPG')"></div>
                <div class="slide" style="background-image: url('foto5.jpeg')"></div>
            </div>
        </div>

        <div class="text">
            <h1>FARIDATUL</h1>
            <h1>KHASANAH</h1>
            <p>Mahasiswa Teknologi Informasi</p>
        </div>
    </div>

   
    <div class="kanan" id="about">
        <img src="foto1.jpg" >
        <div class="about">
            <h2 id="typing"></h2>
            <p>
                Faridatul Khasanah adalah seorang anak yang memiliki cita-cita tinggi,
                menjalani hidup dengan penuh semangat dan tekad.
            </p>
        </div>
    </div>

</div>


<div class="hobi" id="Hobi">
    <h2>My Hobbies</h2>

    <div class="grid">

        <div class="kartu">
            <img src="foto4.jpeg"  class="fotoKlik">
            <h3>Singing</h3>
        </div>

        <div class="kartu">
            <img src="foto6.jpeg"  class="fotoKlik">
            <h3>Drawing</h3>

        </div>

        <div class="kartu">
            <img src="foto7.jpeg"  class="fotoKlik">
            <h3>Reading</h3>

        </div>



    </div>
</div>
<div class="sosmed" >
    <h2>Social Media</h2>

    <div class="sosmed-list">
        <a href="https://www.instagram.com/faridkhsnh?igsh=bGl6cWw0a3RqbzE3">Instagram</a>
        <a href="https://www.linkedin.com/in/faridatul-khasanah-337028393?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app">LinkedIn</a>
        <a href="https://github.com/faridatulkhasanah2804">GitHub</a>
    </div>
</div>
<div class="kontak" id="kontak">
    <h2>Contact Me</h2>

    <form id="contactForm">
        <input type="text" id="nama" placeholder="Nama">
        <input type="email" id="email" placeholder="Email">
        <textarea id="pesan" placeholder="Pesan"></textarea>

        <button type="submit">Kirim</button>
        <p id="message"></p>
    </form>
</div>

<script>
    const tombol = document.getElementById('toggleMode');
const body = document.getElementById('body');

const temaTersimpan = localStorage.getItem('tema');


if (temaTersimpan === 'dark') {
    body.classList.add('dark-mode');
    tombol.textContent = 'Light mode';
} else {
    tombol.textContent = 'Dark mode';
}


tombol.addEventListener('click', () => {
    body.classList.toggle('dark-mode');

    const isDark = body.classList.contains('dark-mode');

    localStorage.setItem('tema', isDark ? 'dark' : 'light');
    tombol.textContent = isDark ? 'Light mode' : 'Dark mode';
});
const form = document.getElementById('contactForm');
const message = document.getElementById('message');

form.addEventListener('submit', function(e) {
    e.preventDefault();

    const nama = document.getElementById('nama').value.trim();
    const email = document.getElementById('email').value.trim();
    const pesan = document.getElementById('pesan').value.trim();

    if (nama === '' || email === '' || pesan === '') {
        message.style.color = 'red';
        message.textContent = 'Semua field harus diisi!';
        return;
    }

    if (!email.includes('@')) {
        message.style.color = 'red';
        message.textContent = 'Format email tidak valid!';
        return;
    }

    message.style.color = 'green';
    message.textContent = 'Pesan berhasil dikirim!';

    form.reset();
});
const text = "About Me";
const typingElement = document.getElementById("typing");

let index = 0;

function ketik() {
    if (index < text.length) {
        typingElement.textContent += text.charAt(index);
        index++;
        setTimeout(ketik, 100); // kecepatan ketik
    }
}

ketik();
const images = document.querySelectorAll('.fotoKlik');
const popup = document.getElementById('popup');
const popupImg = document.getElementById('popupImg');
const closeBtn = document.getElementById('close');


images.forEach(img => {
    img.addEventListener('click', () => {
        popup.style.display = 'block';
        popupImg.src = img.src;
    });
});


closeBtn.onclick = function() {
    popup.style.display = 'none';
};


popup.onclick = function(e) {
    if (e.target !== popupImg) {
        popup.style.display = 'none';
    }
};
</script>
</body>
</html>
